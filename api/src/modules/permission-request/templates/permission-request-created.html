<h2>New Permission Request</h2>
<p><strong>{{requestorName}}</strong> ({{requestorEmail}}) has requested
<strong>{{permissionType}}</strong> access to <strong>{{permissionName}}</strong>.</p>
<table style="border-collapse:collapse;">
    <tr>
        <td style="padding:4px 12px 4px 0;"><strong>Source:</strong></td>
        <td><a href="{{appUrl}}/environments/{{sourceEnvironmentId}}">{{sourceName}}</a></td>
    </tr>
    <tr>
        <td style="padding:4px 12px 4px 0;"><strong>Target:</strong></td>
        <td><a href="{{appUrl}}/environments/{{targetEnvironmentId}}">{{targetName}}</a></td>
    </tr>
    <tr>
        <td style="padding:4px 12px 4px 0;"><strong>Permission:</strong></td>
        <td>{{permissionName}} ({{permissionType}})</td>
    </tr>
</table>
<p><a href="{{appUrl}}/permission-requests/{{permissionRequestId}}">Review this request</a> in <a href="{{appUrl}}">Pontifex</a>.</p>
